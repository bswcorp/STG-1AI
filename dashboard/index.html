<!DOCTYPE html>
<html>
<head>
<title>STG AI</title>
</head>
<body>

<h1>STG AI Dashboard</h1>

<div id="output">Loading...</div>

<script>
async function runAI() {
  try {
    const res = await fetch('http://localhost:3001/api/distill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: "test AI berjalan"
      })
    });

    const data = await res.json();

    document.getElementById("output").innerHTML =
      "Output: " + data.output;

  } catch (err) {
    document.getElementById("output").innerHTML = "API ERROR";
  }
}

runAI();
</script>

</body>
</html>
