<!DOCTYPE html>
<html lang="en">
<head>

      color: #FFFFFF;

      padding: 0;

    }
    header {
      background: linear-gradient(90deg, #00AEEF, #00FFFF, #FF6A00);
      padding: 20px;
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.5);
    }
    header img {
      width: 140px;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2em;
      margin: 0;
    }
    section {
      padding: 30px;
    }
    .card {
      background-color: #111;
      border: 1px solid #00AEEF;
      border-radius: 10px;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      box-shadow: 0 0 15px rgba(0, 150, 255, 0.3);

<body>
  <header>
    <img src="../../assets/STG-AI-logo.png" alt="STG-AI Logo">

  <section>
    <h2>Executor of Notes into Sovereign Ledgers</h2>

</html>
